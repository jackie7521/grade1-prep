<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- 背景：粉藍漸層圓 -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFB5C5"/>
      <stop offset="1" stop-color="#7AC7E5"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- 書包提把 -->
  <path d="M 22 22 Q 22 12 32 12 Q 42 12 42 22"
        stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- 書包主體 -->
  <rect x="14" y="20" width="36" height="34" rx="6" fill="#FF8FA3"/>

  <!-- 書包反光 -->
  <rect x="14" y="20" width="36" height="6" rx="3" fill="#FFC4D1"/>

  <!-- 前袋 -->
  <rect x="19" y="34" width="26" height="16" rx="3" fill="#FFD93D"/>

  <!-- 前袋上的扣環 -->
  <circle cx="32" cy="42" r="2.5" fill="#fff"/>
  <circle cx="32" cy="42" r="1" fill="#FF8FA3"/>

  <!-- 肩帶 -->
  <rect x="16" y="22" width="3" height="30" fill="#D14D72" opacity="0.4" rx="1.5"/>
  <rect x="45" y="22" width="3" height="30" fill="#D14D72" opacity="0.4" rx="1.5"/>

  <!-- 星星裝飾 -->
  <text x="50" y="18" font-size="10" fill="#fff" font-weight="bold">★</text>
</svg>
